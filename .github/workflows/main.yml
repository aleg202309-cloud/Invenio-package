name: Download Python Dependencies (Failsafe)

on:
  workflow_dispatch:

jobs:
  download-deps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Upgrade pip
      run: python -m pip install --upgrade pip
    
    - name: Download packages bypassing dependency resolver
      run: |
        cat << 'EOF' > download_all.py
        import json
        import subprocess
        import sys
        import os

        print("📖 Leyendo Pipfile.lock...")
        with open('Pipfile.lock', 'r') as f:
            lock_data = json.load(f)

        packages = []
        # Extraer paquetes de las secciones default y develop
        for section in ['default', 'develop']:
            if section in lock_data:
                for pkg_name, pkg_info in lock_data[section].items():
                    if 'version' in pkg_info:
                        version = pkg_info['version']
                        packages.append(f"{pkg_name}{version}")

        print(f"📦 Se encontraron {len(packages)} paquetes en el lockfile.")
        os.makedirs('python-packages', exist_ok=True)

        # Crear un requirements.txt limpio (solo nombre==version)
        with open('python-packages/requirements.txt', 'w') as f:
            for pkg in packages:
                f.write(pkg + "\n")

        failed = []
        # Descargar cada paquete INDIVIDUALMENTE sin resolver dependencias
        for i, pkg in enumerate(packages):
            print(f"[{i+1}/{len(packages)}] Descargando {pkg}...")
            cmd = [sys.executable, "-m", "pip", "download", pkg, "--no-deps", "-d", "python-packages/"]
            result = subprocess.run(cmd, capture_output=True, text=True)
            if result.returncode != 0:
                print(f"⚠️ Falló {pkg}: {result.stderr}")
                failed.append(pkg)

        print(f"\n✅ Descarga completada. Fallaron {len(failed)} paquetes.")
        if failed:
            print("Paquetes fallidos:", failed)
        EOF
        
        python download_all.py
        
        echo "📊 Total de archivos descargados:"
        ls python-packages/ | wc -l
        du -sh python-packages/
    
    - name: Compress packages
      run: |
        tar -czf python-dependencies.tar.gz python-packages/
        ls -lh python-dependencies.tar.gz
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-dependencies
        path: python-dependencies.tar.gz
        retention-days: 30
