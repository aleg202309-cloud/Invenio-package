name: Download Python Dependencies

on:
  workflow_dispatch:

jobs:
  download-deps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install pipenv
      run: pip install pipenv
    
    - name: Download all Python packages (using Pipfile.lock strictly)
      run: |
        echo "📦 Descargando dependencias Python desde Pipfile.lock..."
        mkdir -p python-packages
        
        # Generar requirements.txt ESTRICTO desde Pipfile.lock
        pipenv requirements > requirements.txt
        
        echo "📋 Contenido de requirements.txt (primeras 20 líneas):"
        head -20 requirements.txt
        
        # Descargar todos los paquetes con las versiones EXACTAS del lockfile
        cd python-packages
        pip download -r ../requirements.txt -d . --no-deps
        
        # Ver qué se descargó
        echo "📊 Archivos descargados:"
        ls -lh | head -20
        echo "Total archivos: $(ls | wc -l)"
        du -sh .
    
    - name: Copy requirements.txt
      run: cp requirements.txt python-packages/
    
    - name: Compress packages
      run: |
        tar -czf python-dependencies.tar.gz python-packages/
        echo "📦 Tamaño del archivo comprimido:"
        ls -lh python-dependencies.tar.gz
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-dependencies
        path: python-dependencies.tar.gz
        retention-days: 30
