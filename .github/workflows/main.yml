name: Download Python Dependencies

on:
  workflow_dispatch:

jobs:
  download-deps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install pipenv
      run: pip install pipenv
    
    - name: Download all Python packages using pipenv
      run: |
        echo "📦 Descargando dependencias Python usando pipenv..."
        
        # Crear directorio para los paquetes
        mkdir -p python-packages
        
        # Usar pipenv download que respeta perfectamente el Pipfile.lock
        pipenv download --ignore-pipfile --dest python-packages/
        
        # Generar requirements.txt para referencia
        pipenv requirements > python-packages/requirements.txt
        
        # Ver qué se descargó
        echo "📊 Archivos descargados:"
        ls python-packages/ | head -20
        echo "Total archivos: $(ls python-packages/ | wc -l)"
        du -sh python-packages/
    
    - name: Compress packages
      run: |
        tar -czf python-dependencies.tar.gz python-packages/
        echo "📦 Tamaño del archivo comprimido:"
        ls -lh python-dependencies.tar.gz
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-dependencies
        path: python-dependencies.tar.gz
        retention-days: 30
