name: Download Python Dependencies

on:
  workflow_dispatch:

jobs:
  download-deps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install pipenv
      run: pip install pipenv
    
    - name: Verify Pipfile.lock exists
      run: |
        echo "🔍 Verificando archivos..."
        ls -la
        if [ ! -f "Pipfile.lock" ]; then
          echo "❌ ERROR: Pipfile.lock no encontrado"
          exit 1
        fi
        echo "✅ Pipfile.lock encontrado"
    
    - name: Generate requirements.txt from Pipfile.lock
      run: |
        echo "📋 Generando requirements.txt desde Pipfile.lock..."
        
        # Generar requirements.txt con versiones EXACTAS
        pipenv requirements > requirements.txt
        
        echo "📊 Primeras 20 líneas de requirements.txt:"
        head -20 requirements.txt
        
        echo "📊 Total de paquetes:"
        wc -l requirements.txt
    
    - name: Download all packages
      run: |
        echo "📦 Descargando paquetes Python..."
        mkdir -p python-packages
        
        # Descargar todos los paquetes con las versiones exactas
        # Usamos --no-deps porque requirements.txt ya tiene todas las dependencias
        pip download -r requirements.txt -d python-packages/ --no-deps
        
        # Ver qué se descargó
        echo "📊 Archivos descargados:"
        ls python-packages/ | head -20
        echo "Total archivos: $(ls python-packages/ | wc -l)"
        du -sh python-packages/
    
    - name: Copy requirements.txt to packages folder
      run: cp requirements.txt python-packages/
    
    - name: Compress packages
      run: |
        tar -czf python-dependencies.tar.gz python-packages/
        echo "📦 Tamaño del archivo comprimido:"
        ls -lh python-dependencies.tar.gz
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-dependencies
        path: python-dependencies.tar.gz
        retention-days: 30
